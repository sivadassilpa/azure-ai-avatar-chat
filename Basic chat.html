<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Talking Avatar Chat Demo</title>
    <link href="./css/styles.css" rel="stylesheet">
    <script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
    <script src="./js/chat.js"></script>
</head>
<body>
<h1>Talking Avatar Chat Demo</h1>

<div id="configuration">
  <section class="configuration-panel">
    <h2>Azure Speech</h2>
    <label for="speechRegion">Region</label>
    <select id="speechRegion">
      <option value="northeurope">North Europe</option>
      <option value="westeurope">West Europe</option>
      <option value="westus2">West US 2</option>
      <option value="eastus">East US</option>
      <option value="southeastasia">Southeast Asia</option>
    </select>

    <label for="speechKey">Speech resource key</label>
    <input id="speechKey" type="password" autocomplete="off" />

    <label for="sttLocales">Speech recognition locales</label>
    <input id="sttLocales" type="text" value="en-US,de-DE,es-ES,fr-FR,it-IT,ja-JP,ko-KR,zh-CN" />

    <label for="ttsVoice">TTS voice</label>
    <input id="ttsVoice" type="text" value="en-US-AvaMultilingualNeural" />

    <input id="personalVoiceSpeakerProfileID" type="hidden" value="" />
  </section>

  <section class="configuration-panel">
    <h2>Azure OpenAI</h2>
    <label for="azureOpenAIEndpoint">Endpoint</label>
    <input id="azureOpenAIEndpoint" type="url" placeholder="https://your-resource.openai.azure.com" />

    <label for="azureOpenAIKey">API key</label>
    <input id="azureOpenAIKey" type="password" autocomplete="off" />

    <label for="azureOpenAIDeploymentName">Deployment name</label>
    <input id="azureOpenAIDeploymentName" type="text" value="gpt-4o-mini" />

    <label for="systemPrompt">System prompt</label>
    <textarea id="systemPrompt">You are a helpful AI assistant.</textarea>
  </section>

  <section class="configuration-panel">
    <h2>Avatar</h2>
    <label for="talkingAvatarCharacter">Character</label>
    <input id="talkingAvatarCharacter" type="text" value="meg" />

    <label for="talkingAvatarStyle">Style</label>
    <input id="talkingAvatarStyle" type="text" value="business" />

    <label class="checkbox-row">
      <input type="checkbox" id="autoReconnectAvatar" checked />
      Auto reconnect avatar
    </label>
  </section>

  <!-- Optional Azure OpenAI on-your-data fields kept for experimentation.
  <div id="cogSearchConfig" hidden>
    <h2>Azure Cognitive Search Resource</h2>
    <label for="azureCogSearchEndpoint">Endpoint</label>
    <input id="azureCogSearchEndpoint" type="text" />
    <label for="azureCogSearchApiKey">API Key</label>
    <input id="azureCogSearchApiKey" type="password" />
    <label for="azureCogSearchIndexName">Index Name</label>
    <input id="azureCogSearchIndexName" type="text" />
  </div>
  -->
</div>

<button id="startSession" onclick="window.startSession()">Open Avatar Session</button>
<button id="microphone" onclick="window.microphone()" disabled>Start Microphone</button>
<button id="stopSpeaking" onclick="stopSpeaking()" disabled>Stop Speaking</button>
<button id="clearChatHistory" onclick="window.clearChatHistory()">Clear Chat History</button>
<button id="stopSession" onclick="window.stopSession()" disabled>Close Avatar Session</button>

<div id="videoContainer" style="position: relative; width: 960px;">
  <div id="overlayArea" style="position: absolute;">
    <div id="chatHistory" style="
        width: 360px;
        height: 500px;
        font-size: medium;
        border: none;
        resize: none;
        background-color: transparent;
        overflow: hidden;" contentEditable="true" hidden></div>
    </div>
    <div id="localVideo" hidden>
      <video src="video/lisa-casual-sitting-idle.mp4" autoplay loop muted></video>
    </div>
    <div id="remoteVideo"></div>
  </div>
  <div margin-top="5px">
    <div id="showTypeMessageCheckbox">
      <input type="checkbox" id="showTypeMessage" onchange="window.updateTypeMessageBox()" disabled>Type Message</input><br />
    </div>
    <div id="userMessageBox"
      style="width: 940px; min-height: 150px; max-height: 200px; border: 1px solid ; overflow-y: scroll; padding: 10px;"
      hidden type="text" contentEditable="true"></div>
  </div>
  <div>
    <img id="uploadImgIcon" src="./image/attachment.jpg" alt="Button" style="cursor: pointer;" hidden />
  </div>
</body>

</html>
